<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FURBITO">
  <defs>
    <!-- Pitch gradient -->
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4a26"/>
      <stop offset="100%" stop-color="#0b2411"/>
    </linearGradient>
    <!-- Neon accent -->
    <linearGradient id="neon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ffa8"/>
      <stop offset="45%" stop-color="#a8ff3e"/>
      <stop offset="100%" stop-color="#58c516"/>
    </linearGradient>
    <!-- Gold border gradient (metallic) -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff2a8"/>
      <stop offset="45%" stop-color="#ffd43e"/>
      <stop offset="80%" stop-color="#d49b0e"/>
      <stop offset="100%" stop-color="#8a6006"/>
    </linearGradient>
    <!-- Inner glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#a8ff3e" stop-opacity="0.32"/>
      <stop offset="65%" stop-color="#a8ff3e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a8ff3e" stop-opacity="0"/>
    </radialGradient>
    <!-- Diagonal stripes pattern (pitch shine) -->
    <pattern id="stripes" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="36" height="36" fill="transparent"/>
      <rect x="0" y="0" width="18" height="36" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <!-- Shield clip -->
    <clipPath id="shield-clip">
      <path d="M 80 82 L 432 82 L 432 262 C 432 330, 372 384, 256 436 C 140 384, 80 330, 80 262 Z"/>
    </clipPath>
  </defs>

  <!-- Backdrop rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0a1408"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#glow)"/>
  <!-- Inner filo highlight -->
  <rect x="3" y="3" width="506" height="506" rx="93" ry="93"
        fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- SHIELD — crest silhouette -->
  <g>
    <!-- Shield shadow -->
    <path d="M 80 82 L 432 82 L 432 262 C 432 330, 372 384, 256 436 C 140 384, 80 330, 80 262 Z"
          fill="#000" opacity="0.35" transform="translate(0 8)"/>
    <!-- Gold outer border -->
    <path d="M 80 82 L 432 82 L 432 262 C 432 330, 372 384, 256 436 C 140 384, 80 330, 80 262 Z"
          fill="url(#gold)"/>
    <!-- Pitch fill inset -->
    <path d="M 98 100 L 414 100 L 414 260 C 414 322, 362 370, 256 416 C 150 370, 98 322, 98 260 Z"
          fill="url(#pitch)"/>
    <!-- Diagonal stripe overlay -->
    <g clip-path="url(#shield-clip)">
      <rect width="512" height="512" fill="url(#stripes)"/>
      <!-- Center shine bar -->
      <rect x="220" y="80" width="72" height="360" fill="#ffffff" fill-opacity="0.05"/>
      <!-- Top banner -->
      <rect x="98" y="100" width="316" height="46" fill="#0a1408" fill-opacity="0.55"/>
      <rect x="98" y="144" width="316" height="2"  fill="url(#gold)" fill-opacity="0.55"/>
    </g>

    <!-- Banner text: FURBITO (cream, stylized) -->
    <g font-family="'Bebas Neue', 'Arial Black', sans-serif" font-weight="900" letter-spacing="4">
      <text x="256" y="132" text-anchor="middle" font-size="28" fill="#fff7dc">FURBITO</text>
      <text x="256" y="132" text-anchor="middle" font-size="28" fill="none" stroke="#0a1408" stroke-width="0.6" stroke-opacity="0.8">FURBITO</text>
    </g>

    <!-- Big F glyph (italic, chunky) integrated with soccer ball -->
    <g transform="translate(128 160)">
      <!-- drop shadow -->
      <g transform="translate(5 6)" opacity="0.5">
        <path d="M 60 0 L 232 0 L 220 48 L 94 48 L 85 94 L 198 94 L 186 138 L 76 138 L 56 230 L 0 230 Z" fill="#000"/>
      </g>
      <!-- main F — italic slant via skewX -->
      <path d="M 60 0 L 232 0 L 220 48 L 94 48 L 85 94 L 198 94 L 186 138 L 76 138 L 56 230 L 0 230 Z"
            fill="url(#neon)" stroke="#0a1408" stroke-width="3" stroke-linejoin="round"/>
    </g>

    <!-- Soccer ball — bottom right of crest -->
    <g transform="translate(346 320)">
      <!-- Shadow -->
      <ellipse cx="0" cy="48" rx="42" ry="6" fill="#000" opacity="0.4"/>
      <!-- Ball base -->
      <circle r="44" fill="#fff7dc" stroke="#0a1408" stroke-width="3"/>
      <!-- Highlight -->
      <circle cx="-14" cy="-14" r="14" fill="#ffffff" opacity="0.7"/>
      <!-- Pentagons -->
      <g fill="#0a1408">
        <polygon points="0,-16 15,-5 9,13 -9,13 -15,-5"/>
      </g>
      <g stroke="#0a1408" stroke-width="3" stroke-linecap="round" fill="none">
        <line x1="0"  y1="-16" x2="0"   y2="-34"/>
        <line x1="15" y1="-5"  x2="32"  y2="-18"/>
        <line x1="-15" y1="-5" x2="-32" y2="-18"/>
        <line x1="9"  y1="13"  x2="22"  y2="30"/>
        <line x1="-9" y1="13"  x2="-22" y2="30"/>
      </g>
    </g>
  </g>

  <!-- Tiny year ribbon bottom -->
  <g font-family="'Bebas Neue', 'Arial Black', sans-serif" font-weight="900" letter-spacing="6">
    <text x="256" y="476" text-anchor="middle" font-size="18" fill="#ffd43e" opacity="0.85">EST · 2025</text>
  </g>
</svg>
