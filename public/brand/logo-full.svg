<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="FURBITO">
  <defs>
    <linearGradient id="fpitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4a26"/>
      <stop offset="100%" stop-color="#0b2411"/>
    </linearGradient>
    <linearGradient id="fneon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#e8ffa8"/>
      <stop offset="45%" stop-color="#a8ff3e"/>
      <stop offset="100%" stop-color="#58c516"/>
    </linearGradient>
    <linearGradient id="fgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff2a8"/>
      <stop offset="45%" stop-color="#ffd43e"/>
      <stop offset="80%" stop-color="#d49b0e"/>
      <stop offset="100%" stop-color="#8a6006"/>
    </linearGradient>
    <linearGradient id="fword" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff7dc"/>
      <stop offset="55%" stop-color="#ffe79c"/>
      <stop offset="100%" stop-color="#c9a043"/>
    </linearGradient>
    <pattern id="fstripes" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="28" height="28" fill="transparent"/>
      <rect x="0" y="0" width="14" height="28" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <clipPath id="fshield-clip">
      <path d="M 20 40 L 260 40 L 260 172 C 260 224, 218 262, 140 300 C 62 262, 20 224, 20 172 Z"/>
    </clipPath>
  </defs>

  <!-- backdrop (transparent) -->

  <!-- === CREST === -->
  <g transform="translate(10 10)">
    <path d="M 20 40 L 260 40 L 260 172 C 260 224, 218 262, 140 300 C 62 262, 20 224, 20 172 Z"
          fill="#000" opacity="0.35" transform="translate(0 6)"/>
    <path d="M 20 40 L 260 40 L 260 172 C 260 224, 218 262, 140 300 C 62 262, 20 224, 20 172 Z"
          fill="url(#fgold)"/>
    <path d="M 32 52 L 248 52 L 248 170 C 248 214, 212 250, 140 286 C 68 250, 32 214, 32 170 Z"
          fill="url(#fpitch)"/>
    <g clip-path="url(#fshield-clip)">
      <rect width="280" height="320" fill="url(#fstripes)"/>
      <rect x="124" y="40" width="32" height="260" fill="#ffffff" fill-opacity="0.05"/>
    </g>

    <!-- F monogram -->
    <g transform="translate(62 78)">
      <g transform="translate(4 5)" opacity="0.55">
        <path d="M 36 0 L 148 0 L 140 28 L 58 28 L 52 58 L 122 58 L 114 86 L 46 86 L 32 144 L 0 144 Z" fill="#000"/>
      </g>
      <path d="M 36 0 L 148 0 L 140 28 L 58 28 L 52 58 L 122 58 L 114 86 L 46 86 L 32 144 L 0 144 Z"
            fill="url(#fneon)" stroke="#0a1408" stroke-width="2.5" stroke-linejoin="round"/>
    </g>

    <!-- Soccer ball -->
    <g transform="translate(210 212)">
      <circle r="26" fill="#fff7dc" stroke="#0a1408" stroke-width="2.5"/>
      <circle cx="-8" cy="-8" r="8" fill="#ffffff" opacity="0.7"/>
      <polygon points="0,-9 9,-3 5.5,8 -5.5,8 -9,-3" fill="#0a1408"/>
      <g stroke="#0a1408" stroke-width="2" stroke-linecap="round" fill="none">
        <line x1="0"   y1="-9"  x2="0"   y2="-20"/>
        <line x1="9"   y1="-3"  x2="19"  y2="-11"/>
        <line x1="-9"  y1="-3"  x2="-19" y2="-11"/>
        <line x1="5.5" y1="8"   x2="13"  y2="18"/>
        <line x1="-5.5" y1="8"  x2="-13" y2="18"/>
      </g>
    </g>
  </g>

  <!-- === WORDMARK === -->
  <g font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif"
     font-weight="900"
     transform="skewX(-8)">
    <!-- shadow -->
    <text x="318" y="205" font-size="188" letter-spacing="2" fill="#000" opacity="0.55" transform="translate(6 6)">FURBITO</text>
    <!-- ink outline (thick) -->
    <text x="318" y="205" font-size="188" letter-spacing="2" fill="none" stroke="#0a1408" stroke-width="14" stroke-linejoin="round" paint-order="stroke">FURBITO</text>
    <!-- gold outer rim -->
    <text x="318" y="205" font-size="188" letter-spacing="2" fill="none" stroke="url(#fgold)" stroke-width="6" paint-order="stroke">FURBITO</text>
    <!-- cream face -->
    <text x="318" y="205" font-size="188" letter-spacing="2" fill="url(#fword)">FURBITO</text>
    <!-- top shine -->
    <text x="318" y="205" font-size="188" letter-spacing="2" fill="#ffffff" opacity="0.35" clip-path="inset(0 0 55% 0)">FURBITO</text>
  </g>

  <!-- tagline -->
  <g font-family="'Bebas Neue', 'Arial Black', sans-serif" font-weight="900" letter-spacing="12">
    <text x="322" y="248" font-size="22" fill="#a8ff3e">RETRO · ARCADE · FÚTBOL</text>
    <text x="322" y="276" font-size="16" fill="#ffd43e" opacity="0.85" letter-spacing="10">EST · 2025 ·  ⚽  ·  CLUB</text>
  </g>
</svg>
